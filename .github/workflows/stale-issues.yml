name: "Label Idle Issues"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: "read"
    issues: "write"

jobs:
    stale-issues:
        uses: "anolilab/workflows/.github/workflows/stale-issues.yml@bbe85cc99b036e08d0ac7daf7be586218d8e2d0c" # main
        with:
            target-repo: "anolilab/semantic-release"
