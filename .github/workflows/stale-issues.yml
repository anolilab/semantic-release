name: "Label Idle Issues"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: "read"
    issues: "write"

jobs:
    stale-issues:
        uses: "anolilab/workflows/.github/workflows/stale-issues.yml@3951efd646a078e384e881c3579e9f92927d240e" # main
        with:
            target-repo: "anolilab/semantic-release"
