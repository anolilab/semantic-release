name: "Label Idle Issues"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: "read"
    issues: "write"
    pull-requests: "write"

jobs:
    stale-issues:
        uses: "anolilab/workflows/.github/workflows/stale-issues.yml@d7d84717329a45c2b5ffbda19ae76d8604f61c00" # main
        with:
            target-repo: "anolilab/semantic-release"
