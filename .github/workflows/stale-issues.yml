name: "Label Idle Issues"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: "read"
    issues: "write"

jobs:
    stale-issues:
        uses: "anolilab/workflows/.github/workflows/stale-issues.yml@0902480949db1f1d6516f0cc3f8ce245b4242ade" # main
        with:
            target-repo: "anolilab/semantic-release"
