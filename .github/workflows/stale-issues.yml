name: "Label Idle Issues"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 0 * * *"

permissions:
    contents: "read"
    issues: "write"

jobs:
    stale-issues:
        timeout-minutes: 10
        uses: "anolilab/workflows/.github/workflows/stale-issues.yml@main"
        with:
            target-repo: "anolilab/semantic-release"
