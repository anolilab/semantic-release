name: "Lock inactive issues and pull requests"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: "read"
    issues: "write"

jobs:
    lock-closed:
        timeout-minutes: 10
        uses: "anolilab/workflows/.github/workflows/lock-closed.yml@main"
        with:
            target-repo: "anolilab/semantic-release"
