name: "Lock inactive issues and pull requests"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: "read"
    discussions: "write"
    issues: "write"
    pull-requests: "write"

jobs:
    lock-closed:
        uses: "anolilab/workflows/.github/workflows/lock-closed.yml@ffe1f9c618304dee645c2821890ec3f0a91f67b3" # v21.0.0 # main
        with:
            target-repo: "anolilab/semantic-release"
