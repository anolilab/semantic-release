name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
    merge_group: # yamllint disable-line rule:empty-values
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@ffe1f9c618304dee645c2821890ec3f0a91f67b3" # v21.0.0
        with:
            lint_eslint: true
            lint_types: true
            lint_attw: false
            lint_package_json: true
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: true
            lint_rust: false
            node_version: "22"
