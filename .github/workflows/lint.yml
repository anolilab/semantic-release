name: "Lint"
on:
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@3bd9e3be8b2c419cf0e9237c1e78ab9a5e68bafa" # v15.1.3+
        with:
            lint_eslint: true
            lint_types: true
            lint_attw: false
            lint_package_json: true
            lint_markdown: true
            lint_yaml: true
            lint_actionlint: true
            lint_rust: false
            node_version: "22"
