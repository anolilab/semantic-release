name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@ffe1f9c618304dee645c2821890ec3f0a91f67b3" # v21.0.0
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\"]"
