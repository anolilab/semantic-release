name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@5b340a228896b01f6d2b6f3bf3b574caed9ee89b" # v15.3.1+
        with:
            languages: "[\"javascript-typescript\"]"
            branches: "[\"main\"]"
