name: "CodeQL"
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@20b8733e71ebbb165d54fe8cede47e225985a58a" # v15.3.1+
        with:
            languages: '["javascript-typescript"]'
            branches: '["main"]'
