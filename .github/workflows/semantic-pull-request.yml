# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Semantic Pull Request"

on: # yamllint disable-line rule:truthy
    pull_request_target:
        types:
            - "opened"
            - "reopened"
            - "edited"
            - "synchronize"
    merge_group: # yamllint disable-line rule:empty-values

permissions:
    contents: "read"

jobs:
    semantic-pull-request:
        timeout-minutes: 10
        permissions:
            pull-requests: "write" # to analyze PRs (amannn/action-semantic-pull-request)
            statuses: "write" # to mark status of analyzed PR (amannn/action-semantic-pull-request)
        runs-on: "ubuntu-latest"
        name: "Semantic Pull Request"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Validate PR title"
              id: "lint_pr_title"
              if: "github.event_name == 'pull_request_target'"
              uses: "amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50" # v6.1.1
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
              with:
                  types: |
                      build
                      chore
                      ci
                      docs
                      feat
                      fix
                      perf
                      infra
                      refactor
                      revert
                      test

            - uses: "marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88" # v3.0.5
              # When the previous steps fail, the workflow would stop. By adding this
              # condition you can continue the execution with the populated error message.
              if: "github.event_name == 'pull_request_target' && always() && (steps.lint_pr_title.outputs.error_message != null)"
              with:
                  header: "pr-title-lint-error"
                  message: |
                      Hey there and thank you for opening this pull request! 👋🏼

                      We require pull request titles to follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) and it looks like your proposed title needs to be adjusted.

                      Details:

                      ```
                      ${{ steps.lint_pr_title.outputs.error_message }}
                      ```

              # Delete a previous comment when the issue has been resolved
            - if: "${{ github.event_name == 'pull_request_target' && steps.lint_pr_title.outputs.error_message == null }}"
              uses: "marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88" # v3.0.5
              with:
                  header: "pr-title-lint-error"
                  message: |
                      Thank you for following the naming conventions! 🙏
