name: "Preview Release"

on: # yamllint disable-line rule:truthy
    # eslint-disable-next-line yml/no-empty-mapping-value
    pull_request: # yamllint disable-line rule:empty-values

permissions:
    contents: "read" # to fetch code (actions/checkout)

env:
    NX_BRANCH: "${{ github.event.number }}"
    NX_RUN_GROUP: "${{ github.run_id }}"
    HEAD_REF: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}"
    HEAD_REPOSITORY: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}"

jobs:
    preview:
        name: "Preview Release"
        if: "github.repository == 'anolilab/multi-semantic-release'"
        runs-on: "ubuntu-latest"
        permissions:
            contents: "write"
            issues: "write"
            checks: "write"
            pull-requests: "write"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2" # v2.13.2
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
              with:
                  # Number of commits to fetch. 0 indicates all history for all branches and tags.
                  # Pulls all commits (needed for NX)
                  fetch-depth: 0
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1" # v4

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/setup@main"
              with:
                  node-version: "22.x"
                  cache-prefix: "preview-release"
                  run-signatures-audit: false

            # Temporary solution until Nx solve this https://github.com/nrwl/nx/issues/22259
            - name: "Get changed files"
              id: "files"
              uses: "tj-actions/changed-files@c65cd883420fd2eb864698a825fc4162dd94482c" # v44.5.7
              with:
                  files_ignore_from_source_file: ".github/ignore-files-for-nx-affected.yml"
                  base_sha: "${{ steps.setSHAs.outputs.base }}"
                  separator: ","

            - name: "Wait for Build Native workflow"
              uses: "lewagon/wait-on-check-action@3603e826ee561ea102b58accb5ea55a1a7482343" # v1.4.1
              timeout-minutes: 30
              with:
                  ref: "${{ github.event.pull_request.head.sha }}"
                  repo-token: "${{ secrets.GITHUB_TOKEN }}"
                  wait-interval: 15 # seconds
                  check-name: "Check Native Build"
                  allowed-conclusions: "success,skipped,neutral"

            - name: "Download native build artifacts"
              id: "native-artifacts"
              uses: "dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927" # v19
              with:
                  workflow: "build-native.yml"
                  pr: "${{ github.event.pull_request.number }}"
                  name: "bindings-(.+)"
                  name_is_regexp: true
                  path: "artifacts"
                  if_no_artifact_found: "ignore"
                  allow_forks: false

            - name: "Distribute native artifacts to platform packages"
              if: "${{ steps.native-artifacts.outcome == 'success' }}"
              shell: "bash"
              run: |
                  # task-runner: move matching .node files and distribute to npm packages
                  find artifacts -name "task-runner-native.*.node" -exec mv {} packages/tooling/task-runner/ \;
                  cd packages/tooling/task-runner && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  # tui: move matching .node files and distribute to npm packages
                  find artifacts -name "tui-native.*.node" -exec mv {} packages/terminal/tui/ \;
                  cd packages/terminal/tui && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  # vis: move matching .node files and distribute to npm packages
                  find artifacts -name "vis-native.*.node" -exec mv {} packages/tooling/vis/ \;
                  cd packages/tooling/vis && pnpm exec napi artifacts --output-dir . --npm-dir npm && rm -f *.node && cd ../../..

                  rm -rf artifacts/

            - name: "Build"
              shell: "bash"
              run: |
                  files="${{ steps.files.outputs.all_changed_files }}";
                  pnpm run build:affected:prod:packages --files=${files//\\/\/}

            - name: "Preview Release"
              shell: "bash"
              run: "node ./scripts/publish-preview-release.js"
              env:
                  CHANGED_FILES: "${{ steps.files.outputs.all_changed_files }}"
