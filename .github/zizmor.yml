# Zizmor static analyzer config.
# https://docs.zizmor.sh/configuration/

rules:
    dangerous-triggers:
        # These workflows use pull_request_target for write perms but do not
        # check out PR-controlled refs, so fork-takeover doesn't apply.
        ignore:
            - "allo-allo.yaml"
            - "labeler.yml"
            - "semantic-pull-request.yml"

    excessive-permissions:
        # Reusable workflows declare the permissions they need internally;
        # the caller's permissions: block is the union/superset.
        ignore:
            - "cache-clear.yml"
            - "stale-issues.yml"
